<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home: {{session['name']}} </title>
    <link rel="stylesheet" href="{{url_for('static',filename = 'style.css')}}">
</head>

<body>
    <header>
        <h1>file uploader</h1>
    </header>
    <main>
        <a href="{{url_for('upload')}}"><button>upload file</button></a>
        <div class="files">
            {% for file in files%}
            <div class="file">
                <h3>{{file['name']}} ( <i>{{file['mimetype']}}</i> )</h3>
                <a href="{{url_for('download',f_id=file['id'])}}"><button>open dowload link</button></a>
                <button class="download_links" id="{{file['id']}}">copy download link</button>
                <button class="get_links" id="{{file['id']}}">copy get link</button>
            </div>
            {% endfor%}
        </div>
    </main>
    <footer>
        <a href="{{url_for('logout')}}"><button>logout</button></a>
        <button id="showudet">change user details</button>
        <a href="{{url_for('r_user',id = session['id'])}}" onclick="return confirm('are you sure you want to remove your user?')"><button>remove user</button></a>
        <!-- <a href="{{url_for('help')}}"><button></button></a> -->
        <div id="udetail" style="display: none;"><form action="{{url_for('setuser',id = session['id'])}}" method="post">
            <input type="text" name="name" id="" value="{{session['name']}}">
            <input type="text" name="email" id="" value="{{session['email']}}">
            <input type="submit" value="submit">
        </form></div>
    </footer>

</body>
<script src="{{url_for('static',filename= 'home.js')}}"></script>
</html>
